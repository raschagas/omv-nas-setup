# /etc/nas-net-autoconfig/wifi.conf
# WPA supplicant config for NAS WiFi fallback.
# Only used when no wired carrier is detected.
#
# To generate the psk hash:
#   wpa_passphrase "YourSSID" "YourPassword"
#
# Replace the placeholder values below with your actual WiFi credentials.

ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=0

network={
    ssid="CHANGE_ME_SSID"
    psk="CHANGE_ME_PSK"
    key_mgmt=WPA-PSK
    proto=RSN
    pairwise=CCMP
    group=CCMP
}
